<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#18171e" />
  <title>Cube Timer</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2318171e'/%3E%3Crect x='6' y='6' width='8.5' height='8.5' rx='2' fill='%23e5463b'/%3E%3Crect x='17.5' y='6' width='8.5' height='8.5' rx='2' fill='%2318b45f'/%3E%3Crect x='6' y='17.5' width='8.5' height='8.5' rx='2' fill='%232b7fff'/%3E%3Crect x='17.5' y='17.5' width='8.5' height='8.5' rx='2' fill='%23ffd21a'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=17" />
</head>
<body>
  <!-- Stats page link -->
  <a class="stats-link" href="stats.html" aria-label="Statistics" title="Statistics">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="12.5" y="7" width="3" height="10" rx="1"/><rect x="18" y="13" width="3" height="4" rx="1"/></svg>
  </a>

  <!-- Options -->
  <button class="settings-toggle" id="settings-toggle" type="button" aria-label="Options" title="Options">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <div class="modal-backdrop settings-modal" id="settings-panel" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="settings-close" type="button" aria-label="Close">×</button>
      <h2 class="modal-title">Options</h2>

      <div class="opt-group">
        <span class="opt-group-label">Input</span>
        <label class="opt">
          <span>Manual time entry</span>
          <input type="checkbox" id="opt-manual" />
          <span class="switch"></span>
        </label>
      </div>

      <div class="opt-group">
        <span class="opt-group-label">Solving</span>
        <label class="opt">
          <span>Hide interface during solve</span>
          <input type="checkbox" id="opt-hide-ui" />
          <span class="switch"></span>
        </label>
        <label class="opt">
          <span>Hide timer during solve</span>
          <input type="checkbox" id="opt-hide-timer" />
          <span class="switch"></span>
        </label>
      </div>

      <div class="opt-group">
        <span class="opt-group-label">Statistics</span>
        <label class="opt">
          <span>Show Ao50</span>
          <input type="checkbox" id="opt-show-ao50" />
          <span class="switch"></span>
        </label>
        <label class="opt">
          <span>Show Ao100</span>
          <input type="checkbox" id="opt-show-ao100" />
          <span class="switch"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Left sidebar: solves -->
  <aside class="sidebar" id="sidebar" aria-label="Solve history">
    <div class="sidebar-header">
      <div class="session-row">
        <select class="session-select" id="session-select" aria-label="Session"></select>
        <button class="session-btn" id="session-rename" type="button" title="Rename session" aria-label="Rename session">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        </button>
        <button class="session-btn danger" id="session-delete" type="button" title="Delete session" aria-label="Delete session">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
        <button class="session-btn" id="session-new" type="button" title="New session" aria-label="New session">+</button>
      </div>
      <div class="sidebar-sub">
        <span class="sidebar-count"><span id="sidebar-count">0</span> solves</span>
        <button class="clear-all" id="clear-all" type="button">Clear</button>
      </div>
    </div>
    <ul class="solve-list" id="solve-list"></ul>
    <p class="solve-empty" id="solve-empty">No solves yet</p>
  </aside>

  <div class="main-col">
    <main class="app">
      <select class="puzzle-select" id="puzzle-select" aria-label="Puzzle"></select>
      <section class="scramble" id="scramble" aria-label="Scramble"></section>

      <div class="timer-wrap">
        <div class="timer" id="timer">0.00</div>
        <p class="hint" id="hint">Press and hold <kbd>Space</kbd> to get ready</p>
        <div class="manual-entry" id="manual-entry">
          <input class="manual-input" id="manual-input" type="text" inputmode="decimal" autocomplete="off" placeholder="0.00" aria-label="Enter time" />
          <span class="manual-hint">Type a time, press <kbd>Enter</kbd> · e.g. 3415 → 34.15</span>
        </div>
        <button class="new-scramble" id="new-scramble" type="button" aria-label="New scramble" title="New scramble">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
      </div>
    </main>

    <!-- Bottom dock -->
    <footer class="dock">
      <!-- Section 1: cube preview -->
      <section class="dock-preview" aria-label="Scramble preview">
        <div class="preview-inner" id="preview"></div>
      </section>

      <!-- Section 2: stats -->
      <section class="dock-stats" aria-label="Statistics">
        <div class="stat stat-pb" style="--outline: var(--c-F)">
          <span class="stat-label">PB</span>
          <span class="stat-value" id="stat-best">—</span>
        </div>
        <div class="stat-grid" id="stat-grid">
          <div class="stat" style="--outline: var(--c-B)">
            <span class="stat-label">ao5</span>
            <span class="stat-value" id="stat-ao5">—</span>
          </div>
          <div class="stat" style="--outline: var(--c-L)">
            <span class="stat-label">ao12</span>
            <span class="stat-value" id="stat-ao12">—</span>
          </div>
          <div class="stat card-ao50" style="--outline: var(--c-D)">
            <span class="stat-label">ao50</span>
            <span class="stat-value" id="stat-ao50">—</span>
          </div>
          <div class="stat card-ao100" style="--outline: var(--c-R)">
            <span class="stat-label">ao100</span>
            <span class="stat-value" id="stat-ao100">—</span>
          </div>
          <div class="stat" style="--outline: var(--c-B)">
            <span class="stat-label">PB ao5</span>
            <span class="stat-value" id="stat-pb-ao5">—</span>
          </div>
          <div class="stat" style="--outline: var(--c-L)">
            <span class="stat-label">PB ao12</span>
            <span class="stat-value" id="stat-pb-ao12">—</span>
          </div>
          <div class="stat card-ao50" style="--outline: var(--c-D)">
            <span class="stat-label">PB ao50</span>
            <span class="stat-value" id="stat-pb-ao50">—</span>
          </div>
          <div class="stat card-ao100" style="--outline: var(--c-R)">
            <span class="stat-label">PB ao100</span>
            <span class="stat-value" id="stat-pb-ao100">—</span>
          </div>
        </div>
      </section>
    </footer>
  </div>

  <!-- Scramble / preview modal -->
  <div class="modal-backdrop" id="scramble-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" type="button" aria-label="Close">×</button>
      <h3 class="modal-title" id="modal-title"></h3>
      <div class="modal-scramble" id="modal-scramble"></div>
      <div class="modal-preview" id="modal-preview"></div>
    </div>
  </div>

  <script src="script.js?v=15"></script>
</body>
</html>
